<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Apps Script App</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #1f2937;
      }

      main {
        width: min(92vw, 520px);
        padding: 32px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #ffffff;
      }

      button {
        padding: 10px 16px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
      }

      #result {
        margin-top: 16px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Google Apps Script App</h1>
      <p>Click the button to call a server-side Apps Script function.</p>
      <button type="button" onclick="loadServerTime()">Get server time</button>
      <div id="result"></div>
    </main>

    <script>
      function loadServerTime() {
        const result = document.getElementById('result');
        result.textContent = 'Loading...';

        google.script.run
          .withSuccessHandler(function (time) {
            result.textContent = 'Server time: ' + time;
          })
          .withFailureHandler(function (error) {
            result.textContent = 'Error: ' + error.message;
          })
          .getServerTime();
      }
    </script>
  </body>
</html>
